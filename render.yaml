services:
  - type: web
    name: pandastore-chatbot
    runtime: python
    rootDir: chatbot
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: USE_WAITRESS
        value: "1"
      - key: APP_DEBUG
        value: "0"
      - key: TRUST_PROXY
        value: "1"
      - key: TRUSTED_PROXY_HOPS
        value: "1"
      - key: LOG_LEVEL
        value: INFO
      - key: ALLOWED_ORIGINS
        value: https://pandastoreupdate.web.app,https://pandastoreupdate.firebaseapp.com,http://localhost:3000,http://127.0.0.1:3000
      - key: OPENAI_API_KEY
        sync: false
      - key: FIREBASE_CRED_JSON
        sync: false
      - key: TELEMETRY_API_KEY
        sync: false